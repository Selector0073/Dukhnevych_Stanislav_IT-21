<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 1 – Dynamic Theme</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="task1.css">
</head>
<body>

<div class="container py-5">
    <h2 class="mb-4">Dynamic Theme Switcher</h2>

    <div class="card mb-4">
        <div class="card-header">Preset Themes</div>
        <div class="card-body d-flex gap-2 flex-wrap">
            <button class="theme-btn" data-preset="light">Light</button>
            <button class="theme-btn" data-preset="dark">Dark</button>
            <button class="theme-btn" data-preset="ocean">Ocean</button>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">Custom Colors</div>
        <div class="card-body">
            <div class="row g-3 mb-3">
                <div class="col-6 col-md-3">
                    <label class="form-label">Background</label>
                    <input type="color" class="form-control form-control-color w-100" id="inp-bg">
                </div>
                <div class="col-6 col-md-3">
                    <label class="form-label">Surface</label>
                    <input type="color" class="form-control form-control-color w-100" id="inp-surface">
                </div>
                <div class="col-6 col-md-3">
                    <label class="form-label">Text</label>
                    <input type="color" class="form-control form-control-color w-100" id="inp-text">
                </div>
                <div class="col-6 col-md-3">
                    <label class="form-label">Accent</label>
                    <input type="color" class="form-control form-control-color w-100" id="inp-accent">
                </div>
            </div>
            <button class="btn btn-primary" id="btn-save-custom">Save Custom Theme</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Preview</div>
        <div class="card-body">
            <p>This is a preview of the current theme.</p>
            <button class="btn btn-primary me-2">Primary button</button>
            <button class="btn btn-secondary">Secondary button</button>
        </div>
    </div>
</div>

<script src="task1.js"></script>
</body>
</html>
