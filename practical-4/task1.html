<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Завдання 1 — Список</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; }
    .card { border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    #itemList li { cursor: pointer; transition: background .15s; border-radius: 8px; }
    #itemList li:hover { background: #fee2e2; }
  </style>
</head>
<body class="d-flex justify-content-center align-items-start min-vh-100 py-5">
  <div class="card p-4" style="width:100%;max-width:480px">
    <h4 class="mb-3 fw-bold">Динамічний список</h4>

    <div class="input-group mb-3">
      <input id="inputValue" type="text" class="form-control" placeholder="Введіть значення...">
      <button id="addBtn" class="btn btn-primary">Додати</button>
    </div>

    <button id="sortBtn" class="btn btn-outline-secondary btn-sm mb-3">Сортувати за алфавітом</button>

    <p class="text-muted small mb-1">Клікни на елемент, щоб видалити</p>
    <ul id="itemList" class="list-group list-group-flush"></ul>
    <p id="emptyMsg" class="text-center text-muted mt-3">Список порожній</p>
  </div>

  <script>
    const input    = document.getElementById('inputValue');
    const list     = document.getElementById('itemList');
    const emptyMsg = document.getElementById('emptyMsg');

    function updateEmpty() {
      emptyMsg.style.display = list.children.length === 0 ? 'block' : 'none';
    }

    function createItem(text) {
      const li = document.createElement('li');
      li.className = 'list-group-item d-flex justify-content-between align-items-center';

      const span = document.createElement('span');
      span.textContent = text;

      const badge = document.createElement('span');
      badge.className = 'badge bg-danger';
      badge.textContent = '✕';

      li.appendChild(span);
      li.appendChild(badge);

      li.addEventListener('click', () => {
        li.remove();
        updateEmpty();
      });

      return li;
    }

    document.getElementById('addBtn').addEventListener('click', () => {
      const val = input.value.trim();
      if (!val) return;
      list.appendChild(createItem(val));
      input.value = '';
      updateEmpty();
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('addBtn').click();
    });

    document.getElementById('sortBtn').addEventListener('click', () => {
      const items = [...list.querySelectorAll('li')];
      items.sort((a, b) =>
        a.querySelector('span').textContent.localeCompare(
          b.querySelector('span').textContent, 'uk'
        )
      );
      items.forEach(item => list.appendChild(item));
    });

    updateEmpty();
  </script>
</body>
</html>
