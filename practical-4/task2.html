<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Завдання 2 — Стилі</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .card { border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    #textBlock {
      font-size: 16px;
      color: #212529;
      background: #ffffff;
      border: 2px solid #dee2e6;
      border-radius: 10px;
      padding: 20px;
      transition: all .3s ease;
      min-height: 80px;
    }
  </style>
</head>
<body class="d-flex justify-content-center align-items-start min-vh-100 py-5">
  <div class="card p-4" style="width:100%;max-width:520px">
    <h4 class="mb-4 fw-bold">Динамічні стилі</h4>

    <div id="textBlock" class="mb-4">
      Це текстовий блок. Натискай кнопки, щоб змінювати його вигляд!
    </div>

    <div class="d-grid gap-2">
      <button id="btnColor"    class="btn btn-outline-primary">Змінити колір</button>
      <button id="btnFont"     class="btn btn-outline-success">Змінити розмір шрифту</button>
      <button id="btnBg"       class="btn btn-outline-warning">Змінити фон</button>
      <button id="btnToggle"   class="btn btn-outline-secondary">Сховати / Показати текст</button>
      <button id="btnReset"    class="btn btn-danger mt-2">Повернути за замовчуванням</button>
    </div>
  </div>

  <script>
    const block = document.getElementById('textBlock');

    const colors    = ['#dc3545', '#0d6efd', '#198754', '#fd7e14', '#6610f2'];
    const fontSizes = [14, 16, 20, 24, 30];
    const bgs       = ['#ffffff', '#fff3cd', '#d1e7dd', '#cfe2ff', '#f8d7da'];

    let colorIdx  = 0;
    let fontIdx   = 0;
    let bgIdx     = 0;
    let isHidden  = false;

    document.getElementById('btnColor').addEventListener('click', () => {
      colorIdx = (colorIdx + 1) % colors.length;
      block.style.color = colors[colorIdx];
    });

    document.getElementById('btnFont').addEventListener('click', () => {
      fontIdx = (fontIdx + 1) % fontSizes.length;
      block.style.fontSize = fontSizes[fontIdx] + 'px';
    });

    document.getElementById('btnBg').addEventListener('click', () => {
      bgIdx = (bgIdx + 1) % bgs.length;
      block.style.background = bgs[bgIdx];
    });

    document.getElementById('btnToggle').addEventListener('click', () => {
      isHidden = !isHidden;
      block.style.visibility = isHidden ? 'hidden' : 'visible';
    });

    document.getElementById('btnReset').addEventListener('click', () => {
      block.style.color      = '#212529';
      block.style.fontSize   = '16px';
      block.style.background = '#ffffff';
      block.style.visibility = 'visible';
      colorIdx = fontIdx = bgIdx = 0;
      isHidden = false;
    });
  </script>
</body>
</html>
