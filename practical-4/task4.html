<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Завдання 4 — Фільтр та сортування</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f1f5f9; }
    .card { border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    #itemList li { border-radius: 8px; }
    #itemList li.hidden { display: none; }
    .date-label { font-size: .75rem; color: #6c757d; }
  </style>
</head>
<body class="d-flex justify-content-center align-items-start min-vh-100 py-5">
  <div class="card p-4" style="width:100%;max-width:520px">
    <h4 class="mb-3 fw-bold">Фільтр та сортування</h4>

    <div class="input-group mb-3">
      <input id="newItem" type="text" class="form-control" placeholder="Додати новий елемент...">
      <button id="addBtn" class="btn btn-primary">Додати</button>
    </div>

    <input id="searchInput" type="text" class="form-control mb-3" placeholder="Пошук...">

    <div class="d-flex gap-2 mb-3">
      <button id="sortAlpha" class="btn btn-outline-secondary btn-sm">За алфавітом</button>
      <button id="sortDate"  class="btn btn-outline-secondary btn-sm">За датою</button>
    </div>

    <ul id="itemList" class="list-group list-group-flush"></ul>
    <p id="emptyMsg" class="text-center text-muted mt-3" style="display:none">Нічого не знайдено</p>
  </div>

  <script>
    const list        = document.getElementById('itemList');
    const searchInput = document.getElementById('searchInput');
    const emptyMsg    = document.getElementById('emptyMsg');

    let items = [
      { text: 'Яблуко',    date: new Date('2024-01-05') },
      { text: 'Банан',     date: new Date('2024-03-12') },
      { text: 'Вишня',     date: new Date('2024-02-20') },
      { text: 'Груша',     date: new Date('2024-01-30') },
      { text: 'Полуниця',  date: new Date('2024-04-01') },
    ];

    function renderList() {
      const query = searchInput.value.trim().toLowerCase();
      list.innerHTML = '';
      let visible = 0;

      items.forEach(item => {
        const li = document.createElement('li');
        li.className = 'list-group-item d-flex justify-content-between align-items-center';

        const nameSpan = document.createElement('span');
        nameSpan.textContent = item.text;

        const dateSpan = document.createElement('span');
        dateSpan.className = 'date-label';
        dateSpan.textContent = item.date.toLocaleDateString('uk-UA');

        li.appendChild(nameSpan);
        li.appendChild(dateSpan);

        if (query && !item.text.toLowerCase().includes(query)) {
          li.classList.add('hidden');
        } else {
          visible++;
        }

        list.appendChild(li);
      });

      emptyMsg.style.display = visible === 0 ? 'block' : 'none';
    }

    document.getElementById('addBtn').addEventListener('click', () => {
      const val = document.getElementById('newItem').value.trim();
      if (!val) return;
      items.push({ text: val, date: new Date() });
      document.getElementById('newItem').value = '';
      renderList();
    });

    document.getElementById('newItem').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('addBtn').click();
    });

    searchInput.addEventListener('input', renderList);

    document.getElementById('sortAlpha').addEventListener('click', () => {
      items.sort((a, b) => a.text.localeCompare(b.text, 'uk'));
      renderList();
    });

    document.getElementById('sortDate').addEventListener('click', () => {
      items.sort((a, b) => a.date - b.date);
      renderList();
    });

    renderList();
  </script>
</body>
</html>
